<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact - Lungani Zungu</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;800&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <div class="cyber-bg"></div>
  <div class="scan-line"></div>

  <nav>
    <div class="nav-container">
      <div class="logo">LZ.DEV</div>
      <ul class="nav-links" id="navLinks">
        <li><a href="index.html" data-page="home">Home</a></li>
        <li><a href="about.html" data-page="about">About</a></li>
        <li><a href="projects.html" data-page="projects">Projects</a></li>
        <li><a href="contact.html" data-page="contact">Contact</a></li>
        <li><a href="analytics.html" data-page="analytics">Analytics</a></li>
      </ul>
      <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>
    </div>
  </nav>

  <main class="page">
    <div class="container">
      <div class="section-header">
        <span class="section-tag">Let's Connect</span>
        <h2 class="section-title">Get In Touch</h2>
      </div>

      <div class="contact-grid">
        <div class="contact-info">
          <div class="contact-item">
            <span class="contact-icon">📧</span>
            <div class="contact-details">
              <h3>Email</h3>
              <a href="mailto:lunganizungu2018@gmail.com">lunganizungu2018@gmail.com</a>
            </div>
          </div>

          <div class="contact-item">
            <span class="contact-icon">📱</span>
            <div class="contact-details">
              <h3>Phone</h3>
              <a href="tel:0728454762">072 845 4762</a>
            </div>
          </div>

          <div class="contact-item">
            <span class="contact-icon">💼</span>
            <div class="contact-details">
              <h3>LinkedIn</h3>
              <a href="https://www.linkedin.com/in/lungani-zungu" target="_blank">linkedin.com/in/lungani-zungu</a>
            </div>
          </div>

          <div class="contact-item">
            <span class="contact-icon">📍</span>
            <div class="contact-details">
              <h3>Location</h3>
              <p style="color: var(--text-secondary);">Ikhambi St, Rosslyn Gardens</p>
            </div>
          </div>
        </div>

        <div class="contact-form">
          <form id="contactForm">
            <div class="form-group">
              <label for="name">Name</label>
              <input type="text" id="name" required />
            </div>
            <div class="form-group">
              <label for="email">Email</label>
              <input type="email" id="email" required />
            </div>
            <div class="form-group">
              <label for="subject">Subject</label>
              <input type="text" id="subject" required />
            </div>
            <div class="form-group">
              <label for="message">Message</label>
              <textarea id="message" required></textarea>
            </div>

            <button type="submit" class="btn" id="submitBtn" style="width: 100%;">Send Message</button>
          </form>

          <p id="formStatus" style="margin-top: 1rem; color: var(--neon-cyan);"></p>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <div class="container">
      <div class="footer-content">
        <p>&copy; 2025 Lungani Zungu. All rights reserved.</p>
        <div class="social-links">
          <a href="mailto:lunganizungu2018@gmail.com" class="social-btn" title="Email">📧</a>
          <a href="https://www.linkedin.com/in/lungani-zungu" target="_blank" class="social-btn" title="LinkedIn">💼</a>
        </div>
      </div>
    </div>
  </footer>

  <script src="assets/js/app.js"></script>
</body>
</html>
